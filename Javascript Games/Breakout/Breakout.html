<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout</title>

    <style>
        body{
            text-align: center;
            background-color: cornflowerblue;
        }
        #ctx{
            border: 10px solid blue;
            background-color: black;
    
        }

        
    </style>
</head>
<body>
    <h1>Breakout</h1>
    <canvas id="ctx" WIDTH="500" HEIGHT="500"></canvas>
    <script>
        let ctx=document.getElementById('ctx').getContext('2d');
        ctx.font='20px Calibri';
        ctx.fillStyle='white';
        ctx.fillText("Click me to start the game .", 130,250);
        
        const WIDTH=500;
        const HEIGHT=500;
        let numOfTile=0;
        let tileList=[];
        let tileX=5;
        let tileY=5;
        let score=0;
        let running=false;
        let intervalVar;
        let hitcount;
        
        
        let base={
            x:100,
            y:460,
            width:80,
            height:10,
            color:' red',
            pressingLeft:false,
            pressingRight:false,
            lives:3

        };
        let ball={
            x:100,
            y:100,
            color: 'blue',
            radius:5,
            spdX:-5,
            spdY:-5

        };
        let tile={
            width:40,
            height:20,
            color:'orange'
        };

        testCollision=function(base,ball){
            return ((base.x<ball.x+2*ball.radius)&&
                    (ball.x<base.x+base.width)&&
                    (base.y<ball.y+2*ball.radius)&&
                    (ball.y<base.y+base.height)
        
        )};
        testCollisionTile=function(t,ball){
            return ((t.x<ball.x+2*ball.radius)&&
                    (ball.x<t.x+tile.width)&&
                    (t.y<ball.y+2*ball.radius)&&
                    (ball.y<t.y+tile.height)
        )

        };
        
        function drawBase(){
            ctx.save();
            ctx.fillStyle=base.color;
            ctx.fillRect(base.x,base.y,base.width,base.height);
            ctx.restore();
        }

        function drawBall(){
            ctx.save();
            ctx.fillStyle=ball.color;
            ctx.beginPath();
            ctx.arc(ball.x,ball.y,ball.radius,0,2*Math.PI);
            ctx.fill();
            ctx.restore();


        }
        function drawTile(t){

            ctx.save();
            ctx.fillStyle=tile.color;
            ctx.fillRect(t.x,t.y,tile.width,tile.height);
            ctx.restore();

        }
        document.getElementById('ctx').onmousedown=function(){
            if(running){
                
                running=false;
                clearInterval(intervalVar);
                        
               
            
        } gameStart();
    }

        document.onkeydown=function(event){
            if(event.keyCode==37){
                base.pressingLeft=true;
                base.pressingRight=false;
            }
            else if(event.keyCode==39){
                base.pressingLeft=false;
                base.pressingRight=true;
            }
        }

        updateBase=function(){
            if(base.pressingLeft){
                base.x=base.x-5;
            }
            else if(base.pressingRight){
                base.x=base.x+5;
            }
            if(base.x<0){
                base.x=0;
            }
            if(base.x>WIDTH-base.width){
                base.x=WIDTH-base.width;
            }
        }
        updateBall=function(){
            ball.x+=ball.spdX;
            ball.y+=ball.spdY;
            if(ball.x<0||ball.x>WIDTH){
                hitcount++;
                if(hitcount%10==0){
                if(ball.spdX<0)
                ball.spdX=-(Math.abs(ball.spdX)+1);
                else ball.spdX=ball.spdX+1;
                }
                ball.spdX=-ball.spdX;
                
            }
            if(ball.y<0){
                hitcount++;
                if(hitcount%10==0){
                if(ball.spdY<0)
                ball.spdY=-(Math.abs(ball.spdY)+1);
                else ball.spdY=ball.spdY+1;
                }
                ball.spdY=-ball.spdY;
                
            }
            if(ball.y>HEIGHT){
                hitcount++;
                if(hitcount%10==0){
                if(ball.spdY<0)
                ball.spdY=-(Math.abs(ball.spdY)+1);
                else 
                ball.spdY=ball.spdY+1;
                }
                ball.spdY=-ball.spdY;
                base.lives--;
            
        }
    }
        isGameOver=function(){
            if(base.lives<0||score==330){
            
           
            ctx.fillText(" Game Over. Click to restart .",150,250); 
             clearInterval(intervalVar);    
               
            }
                
        }

        
        update=function(){
            ctx.clearRect(0,0,WIDTH,HEIGHT);
            tileList.forEach(drawTile);
           
            drawBall();
            drawBase();
            for(key in tileList){

            if(testCollisionTile(tileList[key],ball)){
                delete(tileList[key]);
                ball.spdY=-ball.spdY;
                score+=5;

            }
             }
             
             isGameOver();
           
            if(testCollision(base,ball)){
        
                ball.spdY=-ball.spdY;
            }
            ctx.fillStyle='white';
            ctx.fillText("score :"+score,10,480);
            ctx.fillText("Lives :"+base.lives,410,480);
            
           updateBall();       
           updateBase();
            
           
           
        }
       
        
        function gameStart(){
        
           
            base.x=150;
            ball.x=base.x+100;
            ball.y=base.y-150;
            
            hitcount=0;
            running=true;
            base.lives=3;
            base.pressingLeft=false;
            base.pressingRight=false;
            score=0;
            tileY=5;
            for(let i=1;i<6;i++){
                tileX=5;
                for(let j=1;j<12;j++){
                    tileList[numOfTile]={x:tileX,y:tileY};
                    numOfTile++;
                    tileX+=45;

                }
                tileY+=25;
            }
            
           
           intervalVar=setInterval(update,20);
           
    
        }

        

    </script>
</body>
</html>
